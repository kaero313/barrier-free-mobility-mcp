name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  APP_MODE: mock
  CACHE_BACKEND: memory

jobs:
  quality:
    name: Test and static checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install uv and Python
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.10.9"
          python-version: "3.12"
          enable-cache: true

      - name: Sync locked dependencies
        run: uv sync --frozen --all-groups

      - name: Run Ruff
        run: uv run --frozen ruff check .

      - name: Run tests
        run: uv run --frozen pytest

      - name: Check release safety
        run: uv run --frozen python scripts/check_release_safety.py

  docker:
    name: Build Docker image
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: quality
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Validate Compose configuration
        run: >-
          docker compose
          -f deploy/hosted/docker-compose.hosted.yml
          --env-file deploy/hosted/hosted.env.example
          config --quiet

      - name: Build image from lockfile
        run: docker build --build-arg UV_VERSION=0.10.9 -t barrier-free-mobility-mcp:ci .
