version: 1

required_sections:
  - "확인 결과"
  - "기준 시각"
  - "주의사항"

banned_phrases:
  - "안전하게 이동 가능합니다"
  - "문제 없습니다"
  - "반드시 이용 가능합니다"

cases:
  - name: hongdae_to_samsung_wheelchair
    category: trip_accessibility
    question: "휠체어로 홍대입구역에서 삼성역까지 갈 수 있어?"
    execution:
      kind: trip_brief
      origin: "홍대입구"
      destination: "삼성"
      mobility_profile:
        wheelchair: true
        can_use_stairs: false
        can_use_escalator: false
        need_elevator_only: true
        max_transfer_count: 1
    expectations:
      status: "SUCCESS"
      risk_level: "CAUTION"
      judgement: "주의 필요"
      clarification_needed: false
      contains:
        - "홍대입구"
        - "삼성"
        - "현재 운행 중"
        - "연결 확인 필요"
        - "지금 할 일"
        - "기준 시각"
      not_contains:
        - "risk_level"
        - "confidence_level"
        - "예상"

