  - name: coex_wheelchair_place_name
    category: place_name
    question: "휠체어로 코엑스 갈 수 있어?"
    execution:
      kind: future_natural_language
      target_capability: "answer_accessibility_question"
    expectations:
      future_reason: "place_candidate_clarification_supported"
      expected_behavior: "코엑스를 삼성역 또는 봉은사역 후보로 안내하고 어느 역 기준인지 묻는다."
      contains:
        - "코엑스"
        - "삼성역"
        - "봉은사역"

