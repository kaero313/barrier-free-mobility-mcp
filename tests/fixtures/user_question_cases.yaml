version: 1

required_sections:
  - "판단:"
  - "이유"
  - "추천 경로"
  - "접근성 체크"
  - "사용자 조건 반영"
  - "기준 시각"
  - "주의사항"

banned_phrases:
  - "안전하게 이동 가능합니다"
  - "문제 없습니다"
  - "반드시 이용 가능합니다"

cases:
  - name: hongdae_to_samsung_wheelchair
    category: trip_accessibility
    question: "휠체어로 홍대입구역에서 삼성역까지 갈 수 있어?"
    execution:
      kind: trip_brief
      origin: "홍대입구"
      destination: "삼성"
      mobility_profile:
        wheelchair: true
        can_use_stairs: false
        can_use_escalator: false
        need_elevator_only: true
        max_transfer_count: 1
    expectations:
      status: "SUCCESS"
      risk_level: "LOW"
      judgement: "가능"
      clarification_needed: false
      contains:
        - "판단: 가능"
        - "홍대입구"
        - "삼성"
        - "엘리베이터 확인"
        - "기준 시각"
      not_contains:
        - "risk_level"
        - "confidence_level"
        - "예상"

  - name: hongdae_to_samsung_stroller
    category: trip_accessibility
    question: "유모차 끌고 홍대입구역에서 삼성역까지 갈만해?"
    execution:
      kind: trip_brief
      origin: "홍대입구"
      destination: "삼성"
      mobility_profile:
        stroller: true
        can_use_stairs: false
        can_use_escalator: false
        max_transfer_count: 1
    expectations:
      status: "SUCCESS"
      risk_level: "LOW"
      judgement: "가능"
      clarification_needed: false
      contains:
        - "판단: 가능"
        - "유모차 이용 조건"
        - "계단 이용 불가 조건"
        - "홍대입구"
        - "삼성"
      not_contains:
        - "risk_level"
        - "confidence_level"
        - "예상"

  - name: hongdae_to_samsung_restroom_destination
    category: restroom_required
    question: "휠체어로 홍대입구역에서 삼성역 가는데 도착역 장애인화장실도 필요해."
    execution:
      kind: trip_brief
      origin: "홍대입구"
      destination: "삼성"
      mobility_profile:
        wheelchair: true
        can_use_stairs: false
        can_use_escalator: false
        need_elevator_only: true
        need_accessible_restroom: true
        accessible_restroom_requirement: "destination"
        max_transfer_count: 1
    expectations:
      status: "SUCCESS"
      risk_level: "LOW"
      judgement: "가능"
      clarification_needed: false
      contains:
        - "판단: 가능"
        - "장애인화장실"
        - "도착역 확인 조건"
        - "삼성"
      not_contains:
        - "risk_level"
        - "confidence_level"
        - "예상"

